<!DOCTYPE html>
<html>
<head>
    <title>MoodForge 🌸</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0f2fe, #fce7f3, #fef9c3);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 340px;
        }

        h1 {
            margin-bottom: 8px;
            color: #7c3aed;
            font-weight: 600;
        }

        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 85%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            background: #f8fafc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #a78bfa;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background: #8b5cf6;
        }

        .result {
            margin-top: 22px;
            font-size: 18px;
            color: #7c3aed;
        }

        .response {
            margin-top: 10px;
            font-size: 15px;
            color: #475569;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🌸 MoodForge</h1>
        <p>how are you feeling today?</p>

        <form method="POST">
            <input type="text" name="text" placeholder="type your mood..." required>
            <br>
            <button type="submit">analyze ✨</button>
        </form>

        {% if prediction %}
            <div class="result">
                mood: {{ prediction }}
            </div>
        {% endif %}

        {% if response %}
            <div class="response">
                {{ response }}
            </div>
        {% endif %}
    </div>

</body>
</html>
